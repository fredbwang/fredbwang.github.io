---
layout: default
title: Duke of AI | Blog
---
<section id="post-list">
    <h1>Blog</h1>
    <p>Thoughts on distributed systems, infrastructure, and engineering.</p>

    {% for post in site.posts %}
    <div class="job-item" style="margin-top: 2rem;">
        <div class="job-header">
            <h3 class="job-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
            <span class="job-date">{{ post.date | date: "%b %d, %Y" }}</span>
        </div>
        <p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
    </div>
    {% endfor %}
</section>
