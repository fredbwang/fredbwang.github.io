<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://use.fontawesome.com/6e47fdd73a.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fred W. | Blog</title>
    <link rel="icon" href="../assets/images/rocket.ico">
    <link rel="stylesheet" href="../css/styles.css">
    <script>
        (function () {
            var savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <!-- Marked.js for rendering markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <main class="content">
        <div class="content-wrapper">
            <!-- Rendered Post Content Container -->
            <article id="content">
                <!-- Content will be injected by markdown.js -->
                <p>Loading post...</p>
            </article>

            <!-- Blog Post List (shown only when no specific post is requested) -->
            <section id="post-list" style="display: none;">
                <h1>Blog</h1>
                <p>Thoughts on distributed systems, infrastructure, and engineering.</p>

                <div class="job-item" style="margin-top: 2rem;">
                    <div class="job-header">
                        <h3 class="job-title"><a href="?post=ai-safety">My Take on AI Safety</a></h3>
                        <span class="job-date">Feb 28, 2026</span>
                    </div>
                    <p>AI had grown to a point where I think it's time to talk about it as a regular person.</p>
                </div>
            </section>

            <footer>
                <div class="contact-links">
                    <a href="mailto:ownerofisland+io@gmail.com"><i class="fa fa-envelope"></i></a>
                    <a href="https://github.com/fredbwang"><i class="fa fa-github"></i></a>
                    <a href="https://www.linkedin.com/in/borui-wang/"><i class="fa fa-linkedin"></i></a>
                </div>
                <p>Copyright 2026 by Fred W.</p>
            </footer>
        </div>
    </main>

    <script src="/js/components.js"></script>
    <script src="/js/markdown.js"></script>
</body>

</html>
